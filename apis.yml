description: >-
  Continue is the open-source AI code assistant for VS Code and JetBrains, distributed under
  Apache 2.0. The Continue IDE extensions and the Continue CLI federate to any LLM provider —
  Anthropic, OpenAI, Mistral, OpenRouter, Ollama, and a Continue-managed proxy — and load their
  configuration from Continue Hub. Continue Hub (api.continue.dev) is the registry and IDE API
  that serves assistants, blocks, models, rules, prompts, docs, and MCP servers to the
  extensions, along with free-trial status, organization policy, secrets sync, and the Stripe
  checkout URL for the Models Add-On. Continue has also pivoted into "continuous AI" — source-
  controlled checks that live as markdown files under .continue/checks/ and run in CI as
  GitHub status checks.
